<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #e8e8e8;
      color: #1a1a2e;
      margin: 0;
      padding: 8px;
    }
    .popup-shell {
      background: #ffffff;
      border-radius: 16px;
      padding: 16px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 span { color: #e94560; }
    .status {
      font-size: 12px;
      color: #6c6c80;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(0,0,0,0.15);
    }
    .dot.active { background: #22c55e; }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: background 0.15s;
    }
    .btn-primary {
      background: #e94560;
      color: white;
    }
    .btn-primary:hover { background: #d63d56; }
    .hint {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 8px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="popup-shell">
  <h1>📍 <span>Pinpoint</span></h1>
  <div class="status">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">未激活</span>
  </div>
  <button class="btn btn-primary" id="toggle-btn">启动选取</button>
  <div class="hint">
    点击「启动选取」开始，再次点击关闭。<br>
    鼠标移到网页元素上会高亮，<br>
    点击选中后可在浮动面板调整样式。
  </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
